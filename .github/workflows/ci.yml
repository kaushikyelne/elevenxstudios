name: CI

on:
  pull_request:
    branches: [master, develop]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-java:
    name: Test Java Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Run Tests
        run: ./gradlew build --no-daemon

  test-python:
    name: Test Python Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [financial-service, agent-service, waitlist]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
            pip install pytest pytest-asyncio  # Ensure test deps are present
          fi

      - name: Run Tests
        run: |
          cd services/${{ matrix.service }}
          if [ -d tests ]; then
            python -m pytest tests/ -v
          else
            echo "No tests found for ${{ matrix.service }}"
          fi

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Notification Service Tests
        run: |
          cd services/notification
          go test ./internal/service/... -v