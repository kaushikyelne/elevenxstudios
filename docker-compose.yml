services:
  db:
    image: postgres:15
    container_name: moneylane-db
    environment:
      POSTGRES_DB: moneylane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d moneylane" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: moneylane-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/moneylane
      DB_USERNAME: postgres
      DB_PASSWORD: root

      # JWT verification only (this is REQUIRED)
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${SUPABASE_JWT_ISSUER}

      # Optional: ONLY if you still have admin/background flows
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    depends_on:
      db:
        condition: service_healthy

  notification:
    build: services/notification/
    container_name: moneylane-notification
    ports:
      - "8081:8080"
    env_file:
      - services/notification/.env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
