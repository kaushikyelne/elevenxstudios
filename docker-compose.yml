services:
  db:
    image: postgres:15
    container_name: moneylane-db
    environment:
      POSTGRES_DB: moneylane
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d moneylane" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: moneylane-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://db:5432/moneylane
      DB_USERNAME: postgres
      DB_PASSWORD: root

      # JWT verification only (this is REQUIRED)
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${SUPABASE_JWT_ISSUER}

      # Optional: ONLY if you still have admin/background flows
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: "true"
    depends_on:
      db:
        condition: service_healthy

  notification:
    build: services/notification/
    container_name: moneylane-notification
    ports:
      - "8081:8080"
    env_file:
      - services/notification/.env
    environment:
      - DATABASE_URL=postgres://postgres:root@db:5432/moneylane?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  financial:
    build: services/financial-service/
    container_name: moneylane-financial
    ports:
      - "8082:8080"
    environment:
      DATABASE_URL: postgresql://postgres:root@db:5432/moneylane
    depends_on:
      db:
        condition: service_healthy

  agent:
    build: services/agent-service/
    container_name: moneylane-agent
    ports:
      - "8083:8080"
    env_file:
      - .env
    environment:
      FINANCIAL_SERVICE_URL: http://financial:8080
    depends_on:
      financial:
        condition: service_started

volumes:
  postgres_data:
